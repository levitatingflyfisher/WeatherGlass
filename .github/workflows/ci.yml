name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone the sibling path-dep packages
        # WeatherGlass depends on these by sibling path (../... relative to
        # this checkout), matching the local monorepo layout. Checked out one
        # level above $GITHUB_WORKSPACE, which is writable — the runner
        # owns the whole .../work/<repo>/ tree, not just the checkout dir.
        # sanctuary_backup_ui itself depends on sanctuary_auth_core by the
        # same sibling path, so both must land under packages/.
        run: |
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryAuthCore ../packages/sanctuary_auth_core
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryBackupUi ../packages/sanctuary_backup_ui
          git clone --depth 1 https://github.com/levitatingflyfisher/ohStyle ../ohStyle
          git clone --depth 1 https://github.com/levitatingflyfisher/ohFleetConformance ../packages/oh_fleet_conformance

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      # Golden (pixel) tests are tagged and excluded here, matching the
      # contract declared in dart_test.yaml and the release workflow: font
      # rasterisation differs across machines, so goldens are for local
      # visual review only.
      # C3: the gz-JS size budget only bites when build/web exists
      - name: Build web (C3 budget artifact)
        run: flutter build web --release
      - name: Test
        run: flutter test --exclude-tags golden

  build-apk:
    name: Build debug APK (smoke)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone the sibling path-dep packages
        run: |
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryAuthCore ../packages/sanctuary_auth_core
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryBackupUi ../packages/sanctuary_backup_ui
          git clone --depth 1 https://github.com/levitatingflyfisher/ohStyle ../ohStyle
          git clone --depth 1 https://github.com/levitatingflyfisher/ohFleetConformance ../packages/oh_fleet_conformance

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      # A debug build is enough to catch Gradle / Android-manifest / NDK /
      # resource regressions on every push without the cost of a signed release.
      - name: Build debug APK
        run: flutter build apk --debug

  build-web:
    name: Build web release (smoke)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone the sibling path-dep packages
        run: |
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryAuthCore ../packages/sanctuary_auth_core
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryBackupUi ../packages/sanctuary_backup_ui
          git clone --depth 1 https://github.com/levitatingflyfisher/ohStyle ../ohStyle
          git clone --depth 1 https://github.com/levitatingflyfisher/ohFleetConformance ../packages/oh_fleet_conformance

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      # Catches dart:io/ffi imports leaking outside the web/native
      # conditional-import trios (only a web compile can see those) and
      # drift/base-href-shaped deploy breakage. Built with the same
      # --base-href the gh-pages deploy uses (docs/how-to/deploy-pwa-and-apk.md).
      - name: Build web (release, deploy base-href)
        run: flutter build web --release --base-href /WeatherGlass/
