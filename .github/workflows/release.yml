name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Glass

      # Sibling path deps for encrypted backup (SANCTUARY-BRIEF §3, §4.W2).
      # pubspec.yaml points at ../packages/..., so these must land next to
      # the Glass checkout above.
      - uses: actions/checkout@v4
        with:
          repository: levitatingflyfisher/sanctuaryAuthCore
          path: packages/sanctuary_auth_core

      - uses: actions/checkout@v4
        with:
          repository: levitatingflyfisher/sanctuaryBackupUi
          path: packages/sanctuary_backup_ui

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          # sanctuary_auth_core / sanctuary_backup_ui both require Dart SDK
          # >=3.10.7; 3.29.x ships an older Dart than that floor.
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Glass
        run: flutter pub get

      - name: Generate code
        working-directory: Glass
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: Glass
        # Exclude golden tests: pixel goldens are environment-specific (font
        # rasterisation differs on CI runners) and are for local visual review.
        run: flutter test test/ --exclude-tags golden

  build-and-release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Glass

      - uses: actions/checkout@v4
        with:
          repository: levitatingflyfisher/sanctuaryAuthCore
          path: packages/sanctuary_auth_core

      - uses: actions/checkout@v4
        with:
          repository: levitatingflyfisher/sanctuaryBackupUi
          path: packages/sanctuary_backup_ui

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Glass
        run: flutter pub get

      - name: Generate code
        working-directory: Glass
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build split APKs (for direct download)
        working-directory: Glass
        run: flutter build apk --split-per-abi --release

      - name: Build AAB (for Google Play)
        working-directory: Glass
        run: flutter build appbundle --release

      - name: Generate SHA256 checksums
        working-directory: Glass/build/app/outputs/flutter-apk
        run: |
          for f in *.apk; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Glass/build/app/outputs/flutter-apk/*.apk
            Glass/build/app/outputs/flutter-apk/*.sha256
            Glass/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
          draft: true
