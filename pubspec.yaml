name: glass
description: WeatherGlass — a calm, local-first FLOSS weather app. Read the sky, tell no one.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  go_router: ^14.2.7
  fpdart: ^1.1.0
  uuid: ^4.4.2
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  http: ^1.2.0
  geolocator: ^13.0.1
  lucide_flutter: ^1.7.0
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  sanctuary_auth_core:
    path: ../packages/sanctuary_auth_core
  sanctuary_backup_ui:
    path: ../packages/sanctuary_backup_ui

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3D82C9"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#F7FAFC"
    theme_color: "#3D82C9"

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0
  flutter_goldens:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
