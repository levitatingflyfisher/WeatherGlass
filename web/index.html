<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WeatherGlass — a calm, local-first weather app for the home. No account, no tracking.">
  <meta name="theme-color" content="#3D82C9">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WeatherGlass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WeatherGlass</title>
  <link rel="manifest" href="manifest.json">
  <script>/* keep local data across sessions (resist eviction on installed PWAs) */if(navigator.storage&&navigator.storage.persist){try{navigator.storage.persist();}catch(e){}}</script>
  <style>
#oh-boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F7FAFC;z-index:99999;transition:opacity .35s ease}
#oh-boot .s{width:42px;height:42px;border:3px solid #E1E8F0;border-top-color:#3D82C9;border-radius:50%;animation:ohspin .8s linear infinite}
@keyframes ohspin{to{transform:rotate(360deg)}}
@media(prefers-color-scheme:dark){#oh-boot{background:#0F151E}#oh-boot .s{border-color:#18212E;border-top-color:#5C9BD8}}
</style>
  <script>
(function(){
  // Self-heal stale PWA caches: when a new service worker takes over after a
  // redeploy, reload once so a returning visitor never sees a blank stale shell.
  if('serviceWorker' in navigator){var done=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){if(done)return;done=true;location.reload();});
    navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.update();});}).catch(function(){});}
  // Remove the boot spinner once Flutter has painted (or after a hard timeout).
  var iv=setInterval(function(){
    if(document.querySelector('flt-glass-pane,flutter-view,flt-scene-host')){
      clearInterval(iv);var b=document.getElementById('oh-boot');
      if(b){b.style.opacity='0';setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},400);}
    }},150);
  setTimeout(function(){var b=document.getElementById('oh-boot');if(b&&b.parentNode)b.parentNode.removeChild(b);},25000);
})();
</script>
</head>
<body>
<div id="oh-boot"><div class="s"></div></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
